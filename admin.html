<!DOCTYPE html>
<html>
<head>
<title>Admin Panel - No Clue Crew</title>
<link rel="icon" type="image/x-icon" href="/Images/Logo.png">
<link rel="stylesheet" href="Css/style.css">
<script src="JavaScript/script.js"></script>
</head>
<body>

<div class="center-box">

<h2>Admin Panel</h2>

<input id="pass" placeholder="Enter password">
<button onclick="login()">Enter</button>

<div id="panel" style="display:none; margin-top:20px;">

<div class="card">
<h3>Daily Links</h3>
<input id="newLink" placeholder="Enter link">
<button onclick="addLink()">Add</button>
<div id="linksList"></div>
</div>

<div class="card">
<h3>Leaderboard</h3>
<input id="pName" placeholder="Player name">
<input id="pPoints" placeholder="Points">
<button onclick="addPlayer()">Add Player</button>
<button onclick="resetScores()">Reset Scores</button>
<div id="leaderboardAdminList"></div>
</div>

<div class="card">
<h3>Duels</h3>
<input id="dName" placeholder="Duel name">
<input id="dDate" type="date">
<input id="dTime" type="time">
<input id="dTheme" placeholder="Theme">
<button onclick="addDuel()">Add Duel</button>
<div id="duelAdminList"></div>
</div>

<div class="card">
<h3>Emails</h3>
<div id="emailList"></div>
</div>

</div>

</div>

</body>
</html>
